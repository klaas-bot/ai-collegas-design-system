
<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  
  <!-- AI text -->
  <text x="50" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="80" font-weight="bold" fill="url(#aiGradient)">AI</text>
  
  <!-- Collega's background -->
  <rect x="150" y="100" width="320" height="100" rx="50" ry="50" fill="url(#bgGradient)"/>
  
  <!-- Collega's text -->
  <text x="310" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="60" font-weight="bold" fill="#ffffff" text-anchor="middle">Collega's</text>
  
  <!-- .NL text in WHITE -->
  <text x="490" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="80" font-weight="bold" fill="#ffffff">.NL</text>
</svg>